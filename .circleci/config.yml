version: 2.1

jobs:
  test:
    docker:
      - image: circleci/node:14

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: npm install

      - run:
          name: Lint code
          command: npm run lint

      - run:
          name: Check code formatting
          command: npm run format:check

      - run:
          name: Run tests
          command: npm test

workflows:
  test_workflow:
    jobs:
      - test
